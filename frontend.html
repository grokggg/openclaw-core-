<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 修复版</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #0f172a; color: white; }
        h1 { color: #60a5fa; }
        button { 
            background-color: #3b82f6; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 5px; 
        }
        button:hover { background-color: #2563eb; }
        .log { margin-top: 20px; padding: 10px; border: 1px solid #334155; border-radius: 5px; height: 200px; overflow-y: auto; background: #1e293b; }
        .log p { margin: 2px 0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🚀 OpenClaw 修复版</h1>
    <p>点击测试按钮验证功能：</p>
    
    <button onclick="testHealth()">测试健康</button>
    <button onclick="startWorkflow()">启动工作流</button>
    <button onclick="testAPIs()">测试所有API</button>
    
    <div class="log" id="log"></div>

    <script>
        const log = document.getElementById('log');
        
        function add(message, type = 'info') {
            const p = document.createElement('p');
            p.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
            p.style.color = type === 'error' ? '#ef4444' : 
                           type === 'success' ? '#4ade80' : '#d1d5db';
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        async function testHealth() {
            add('测试健康检查...');
            try {
                const response = await fetch('/health');
                const data = await response.json();
                add('✅ 健康检查成功: ' + JSON.stringify(data), 'success');
            } catch (error) {
                add('❌ 健康检查失败: ' + error.message, 'error');
            }
        }

        async function startWorkflow() {
            add('启动工作流...');
            try {
                const response = await fetch('/api/orchestrator/sessions/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ workflowType: 'product_launch' })
                });
                const data = await response.json();
                if (data.success) {
                    add('✅ 工作流启动成功! 会话ID: ' + data.data.sessionId, 'success');
                } else {
                    add('❌ 启动失败: ' + (data.error || '未知错误'), 'error');
                }
            } catch (error) {
                add('❌ 请求失败: ' + error.message, 'error');
            }
        }
        
        async function testAPIs() {
            add('开始测试所有API...');
            await testHealth();
            add('等待2秒后测试工作流API...');
            setTimeout(startWorkflow, 2000);
        }
        
        // 页面加载时自动测试一次
        window.onload = function() {
            add('页面加载完成，可以点击按钮测试功能');
            add('服务器地址: ' + window.location.origin);
        };
    </script>
</body>
</html>
